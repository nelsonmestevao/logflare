name: Integration Tests with Supabase (reusable)

# Reusable workflow that runs the Supabase Playwright E2E suite against a chosen
# Logflare log-storage backend. Called by integration-supabase.yml once per
# backend (postgres, bigquery). The backend is selected via the LF_E2E_BACKEND
# env var, which the E2E harness reads (see test/e2e/supabase/config.sh).

on:
  workflow_call:
    inputs:
      backend:
        description: 'Logflare log-storage backend: postgres | bigquery'
        required: true
        type: string

defaults:
  run:
    working-directory: test/e2e/supabase

jobs:
  test:
    name: ${{ inputs.backend }} / ${{ matrix.browsers.name }}
    runs-on: ubuntu-latest

    env:
      LF_E2E_BACKEND: ${{ inputs.backend }}

    strategy:
      matrix:
        browsers:
          - name: Chrome
            project: chromium
          - name: Firefox
            project: firefox
          - name: Safari
            project: webkit

    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Build and cache Logflare image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        tags: supabase/logflare:local
        load: true
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
        pull: true

    - name: Move Docker cache
      # Temp fix
      # https://github.com/docker/build-push-action/issues/252
      # https://github.com/moby/buildkit/issues/1896
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache
      working-directory: .

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
        cache-dependency-path: test/e2e/supabase/package-lock.json

    - name: Configure BigQuery credentials
      if: inputs.backend == 'bigquery'
      env:
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
      run: |
        creds="$GITHUB_WORKSPACE/test/e2e/supabase/gcloud.json"
        printf '%s' "$GCP_SA_KEY" > "$creds"
        {
          echo "LOGFLARE_GCLOUD_JSON=$creds"
          echo "GOOGLE_PROJECT_ID=$GCP_PROJECT_ID"
          echo "GOOGLE_PROJECT_NUMBER=$GCP_PROJECT_NUMBER"
          # Unique dataset suffix per matrix leg + run isolates parallel BQ datasets.
          echo "GOOGLE_DATASET_ID_APPEND=_e2e_${{ matrix.browsers.project }}_${{ github.run_id }}"
        } >> "$GITHUB_ENV"

    - name: Setup Supabase services
      run: bash ./setup-supabase-services.sh

    - name: Install dependencies
      run: npm ci

    - name: Cache Playwright ${{ matrix.browsers.name }} browser
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ matrix.browsers.project }}-${{ hashFiles('test/e2e/supabase/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-${{ matrix.browsers.project }}-

    - name: Install Playwright ${{ matrix.browsers.name }} browser
      run: npx playwright install ${{ matrix.browsers.project }}

    - name: Install Playwright ${{ matrix.browsers.name }} system deps
      run: npx playwright install-deps ${{ matrix.browsers.project }}

    - name: Run Playwright tests (only ${{ matrix.browsers.name }})
      run: npx playwright test --project ${{ matrix.browsers.project }}

    - name: Capture container logs
      if: failure()
      run: |
        mkdir -p container-logs
        docker ps -a --format '{{.Names}}\t{{.Image}}\t{{.Status}}' > container-logs/_containers.txt
        for c in $(docker ps -a --format '{{.Names}}'); do
          docker logs --timestamps "$c" > "container-logs/${c}.log" 2>&1 || true
        done

    - name: Generate failure summary
      if: failure()
      run: bash ./ci-failure-summary.sh >> "$GITHUB_STEP_SUMMARY"

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ inputs.backend }}-${{ matrix.browsers.project }}
        path: test/e2e/supabase/playwright-report/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: container-logs-${{ inputs.backend }}-${{ matrix.browsers.project }}
        path: test/e2e/supabase/container-logs/
        retention-days: 30
